name: ESC/POS Print Proxy
version: "0.4.1"
slug: escpos_print_proxy
description: >-
  Receives bearer-authenticated print jobs over HTTP from cloud-hosted
  Odoo POS and forwards them to a local ESC/POS network printer
  (TCP:9100). Pair with a Cloudflare Tunnel for inbound access.
url: https://github.com/WOOWTECH/Odoo_pos_self_checkout_enhance
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
init: false
host_network: true
ports:
  8073/tcp: 8073
ports_description:
  8073/tcp: Print proxy HTTP endpoint (bind behind Cloudflare Tunnel)
options:
  api_key: ""
  printer_ip: ""
  printers: []
  port: 8073
schema:
  api_key: password
  printer_ip: "str?"
  printers:
    - label: str
      ip: str
      paper_mm: list(58|80)?
  port: port
